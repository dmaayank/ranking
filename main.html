<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Character Ranker</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

</head>

<body>
    <div class="container">
        <h1 id="main-title">Character Ranker</h1>
        <p id="progress">Loading...</p>

        <div id="choice">
            <h2>Choose your Universe:</h2>
            <button id="btn-choose-the100">The 100</button>
            <button id="btn-choose-starwars">Star Wars</button>
        </div>

        <div id="game-ui">
            <h3>Who do you prefer?</h3>
            <div class="buttons-container">
                <button id="btn-left">
                    <img id="img-left" src="" alt="">
                    <span id="text-left">Option A</span>
                </button>
                <button id="btn-right">
                    <img id="img-right" src="" alt="">
                    <span id="text-left">Option B</span>
                </button>
            </div>
        </div>

        <div id="results">
            <h2>Your Final Rankings:</h2>
            <ol id="rank-list"></ol>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

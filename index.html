<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Character Ranker</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
    <div class="container">
        <h1 id="main-title">Character Ranker</h1>
        <p id="progress">Loading...</p>

        <div id="choice">
            <h2>Choose your Universe:</h2>
            <button id="btn-choose-the100">The 100</button>
            <button id="btn-choose-starwars">Star Wars</button>
            <button id="btn-choose-percy">Percy Jackson</button>
            <button id="btn-choose-tolkien">Middle-earth</button>
            <button id="btn-choose-clonewars">The Clone Wars</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="controls-panel">
            <button id="btn-back">← Change Universe</button>
            <button id="btn-undo" disabled>↺ Undo Last Choice</button>
        </div>
        <p id="game-prompt">Who do you prefer?</p>
        
        <div class="buttons-container">
            <button id="btn-left">
                <img id="img-left" src="" alt="">
                <span>Option A</span> </button>
            <button id="btn-right">
                <img id="img-right" src="" alt="">
                <span>Option B</span>
            </button>
        </div>
    </div>

    <div id="results" class="container">
        <h2>Your Final Rankings:</h2>
        <ol id="rank-list"></ol>
    </div>

    <script src="script.js"></script>
</body>

</html>
